name: ci-cd

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend_checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend_checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: survey_service_test
          POSTGRES_USER: survey_user
          POSTGRES_PASSWORD: survey_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U survey_user -d survey_service_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r backend/requirements.txt

      - name: Run migrations
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://survey_user:survey_password@localhost:5432/survey_service_test
          JWT_SECRET_KEY: test-secret-key
        run: python backend/migrate.py

      - name: Run backend tests
        env:
          APP_ENV: test
          DATABASE_URL: postgresql://survey_user:survey_password@localhost:5432/survey_service_test
          TEST_DATABASE_URL: postgresql://survey_user:survey_password@localhost:5432/survey_service_test
          JWT_SECRET_KEY: test-secret-key
        run: pytest backend/tests -q

  e2e_smoke:
    runs-on: ubuntu-latest
    needs:
      - frontend_checks
      - backend_checks
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: cp .env.example .env

      - name: Start app with Docker Compose
        run: docker compose up -d --build

      - name: Wait for healthcheck
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1/api/health >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Application did not become healthy in time"
          docker compose logs
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1
        run: npm run test:e2e

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs:
      - frontend_checks
      - backend_checks
      - e2e_smoke
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${{ secrets.VPS_APP_DIR }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Repository not found in $APP_DIR. Clone it on the VPS first."
              exit 1
            fi

            cd "$APP_DIR"
            cat <<'EOF' > .env
            ${{ secrets.PROD_ENV_FILE }}
            EOF
            chmod 600 .env
            chmod +x scripts/deploy.sh
            APP_DIR="$APP_DIR" DEPLOY_BRANCH=main bash scripts/deploy.sh
